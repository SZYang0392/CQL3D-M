<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2b4c7e"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666666"/>
    </marker>
    <marker id="arrowRed" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#b14444"/>
    </marker>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .panelTitle { font: 700 22px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .subtitle { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
      .label { font: 600 16px 'Segoe UI', Arial, sans-serif; fill: #1f2937; }
      .text { font: 400 15px 'Segoe UI', Arial, sans-serif; fill: #24303f; }
      .small { font: 400 13px 'Segoe UI', Arial, sans-serif; fill: #4b5563; }
      .tiny { font: 400 12px 'Segoe UI', Arial, sans-serif; fill: #6b7280; }
      .panel { fill: #ffffff; stroke: #d1d5db; stroke-width: 2; }
      .section { fill: #f8fafc; stroke: #e5e7eb; stroke-width: 1.5; }
      .axis { stroke: #666666; stroke-width: 2.5; stroke-dasharray: 8 7; }
      .beam { stroke: #1d4ed8; stroke-width: 4; fill: none; }
      .optical { stroke: #0f766e; stroke-width: 4; fill: none; }
      .measure { stroke: #2b4c7e; stroke-width: 2.5; fill: none; marker-start: url(#arrow); marker-end: url(#arrow); }
      .measureGray { stroke: #666666; stroke-width: 2; fill: none; marker-start: url(#arrowGray); marker-end: url(#arrowGray); }
      .offset { stroke: #b14444; stroke-width: 2.5; fill: none; marker-start: url(#arrowRed); marker-end: url(#arrowRed); }
      .guide { stroke: #9ca3af; stroke-width: 1.5; fill: none; stroke-dasharray: 5 5; }
      .frame { stroke: #374151; stroke-width: 2.5; fill: none; marker-end: url(#arrowGray); }
      .noteBox { fill: #fef3c7; stroke: #f59e0b; stroke-width: 1.5; }
      .probBox { fill: #ecfeff; stroke: #0891b2; stroke-width: 1.5; }
      .pointBlue { fill: #1d4ed8; }
      .pointGreen { fill: #0f766e; }
      .pointRed { fill: #b14444; }
      .machine { fill: #eef6ff; stroke: #bfd6f7; stroke-width: 1.5; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#f3f4f6"/>
  <text x="60" y="50" class="title">CQL3D / NFREYA geometry sketch for blenp, pivot, bleni, and sfrac1</text>
  <text x="60" y="80" class="subtitle">Schematic only, not to scale. Based on cqlinput_help and the coordinate transforms in freya.f / zfreya.f.</text>

  <rect x="50" y="110" width="720" height="820" rx="18" class="panel"/>
  <rect x="830" y="110" width="720" height="820" rx="18" class="panel"/>

  <text x="80" y="150" class="panelTitle">A. Overall beamline placement: blenp and the fiducial pivot point</text>
  <text x="860" y="150" class="panelTitle">B. Dual-source geometry for nsourc = 2: bleni and sfrac1</text>

  <rect x="80" y="180" width="660" height="300" rx="14" class="section"/>
  <text x="105" y="215" class="label">A1. Advance from the source exit plane to the pivot point along the beamline axis</text>
  <line x1="165" y1="260" x2="165" y2="420" stroke="#9ca3af" stroke-width="4"/>
  <text x="96" y="250" class="text">source exit plane</text>
  <text x="104" y="272" class="small">(x = 0 in beamline frame)</text>

  <line x1="165" y1="340" x2="480" y2="340" class="axis"/>
  <text x="250" y="328" class="text">beamline axis</text>

  <circle cx="480" cy="340" r="8" class="pointBlue"/>
  <text x="498" y="332" class="label">fiducial pivot point</text>
  <text x="498" y="354" class="small">reference point used to rotate and place the beamline</text>

  <path d="M 165 385 L 480 385" class="measure"/>
  <text x="290" y="374" class="label">blenp</text>
  <text x="212" y="410" class="small">distance from source exit plane to pivot</text>

  <line x1="480" y1="340" x2="668" y2="240" class="beam"/>
  <text x="610" y="225" class="label">beam direction after</text>
  <text x="611" y="246" class="label">angleh / anglev rotations</text>

  <path d="M 520 332 A 50 50 0 0 0 538 288" stroke="#2b4c7e" stroke-width="2.5" fill="none" marker-end="url(#arrow)"/>
  <text x="543" y="300" class="small">apply</text>
  <text x="543" y="318" class="small">angleh, anglev</text>

  <line x1="480" y1="340" x2="555" y2="340" class="frame"/>
  <line x1="480" y1="340" x2="480" y2="275" class="frame"/>
  <text x="560" y="345" class="small">x(local)</text>
  <text x="486" y="268" class="small">z(local)</text>

  <rect x="80" y="510" width="660" height="380" rx="14" class="section"/>
  <text x="105" y="545" class="label">A2. Place the pivot point in machine coordinates using rpivot and zpivot</text>

  <circle cx="220" cy="790" r="7" fill="#374151"/>
  <text x="103" y="818" class="text">machine origin</text>
  <text x="110" y="838" class="small">(tokamak center in the R-Z sketch)</text>
  <line x1="220" y1="790" x2="420" y2="790" class="frame"/>
  <line x1="220" y1="790" x2="220" y2="610" class="frame"/>
  <text x="430" y="796" class="label">R</text>
  <text x="226" y="602" class="label">Z</text>

  <circle cx="510" cy="690" r="8" class="pointBlue"/>
  <text x="528" y="684" class="label">pivot at (rpivot, zpivot)</text>
  <text x="528" y="706" class="small">this is where the local beamline frame is anchored</text>

  <path d="M 220 760 L 510 760" class="measure"/>
  <text x="342" y="748" class="label">rpivot</text>
  <path d="M 542 790 L 542 690" class="measureGray"/>
  <text x="553" y="744" class="label">zpivot</text>

  <line x1="510" y1="690" x2="690" y2="600" class="beam"/>
  <text x="608" y="585" class="text">injected beam in machine frame</text>

  <rect x="420" y="780" width="280" height="78" rx="12" class="noteBox"/>
  <text x="438" y="807" class="text">angleh is referenced to the vertical plane</text>
  <text x="438" y="828" class="text">through the pivot point and the toroidal axis.</text>
  <text x="438" y="849" class="text">Tangency radius = sin(angleh) * rpivot</text>

  <rect x="860" y="180" width="660" height="220" rx="14" class="section"/>
  <text x="885" y="215" class="label">B1. Exit plane offsets: each source center is displaced from the beamline axis</text>
  <text x="885" y="238" class="small">Mirror-image source centers are specified by bhofset and bvofset.</text>

  <rect x="935" y="260" width="240" height="110" rx="10" fill="#ffffff" stroke="#cbd5e1" stroke-width="1.5"/>
  <text x="1004" y="285" class="small">exit plane (y-z view)</text>
  <line x1="1055" y1="345" x2="1138" y2="345" class="guide"/>
  <line x1="1055" y1="345" x2="1055" y2="282" class="guide"/>
  <circle cx="1055" cy="345" r="6" class="pointBlue"/>
  <text x="948" y="364" class="text">beamline axis</text>

  <circle cx="1112" cy="306" r="7" class="pointGreen"/>
  <circle cx="998" cy="384" r="7" class="pointGreen"/>
  <text x="1127" y="308" class="text">source 1 center</text>
  <text x="882" y="389" class="text">source 2 center</text>

  <path d="M 1055 345 L 1112 345" class="offset"/>
  <text x="1066" y="335" class="small">bhofset</text>
  <path d="M 1112 345 L 1112 306" class="offset"/>
  <text x="1122" y="329" class="small">bvofset</text>

  <rect x="1225" y="266" width="265" height="98" rx="12" class="probBox"/>
  <text x="1242" y="295" class="text">sfrac1 = current fraction from source 1</text>
  <text x="1242" y="319" class="text">prob(source 1) = sfrac1</text>
  <text x="1242" y="343" class="text">prob(source 2) = 1 - sfrac1</text>

  <rect x="860" y="430" width="660" height="460" rx="14" class="section"/>
  <text x="885" y="465" class="label">B2. bleni connects each source centerline to the common beamline axis</text>
  <text x="885" y="488" class="small">After the source-to-beamline transform, both sources feed the same beamline axis and then share blenp.</text>

  <line x1="950" y1="655" x2="1420" y2="655" class="axis"/>
  <text x="1110" y="642" class="text">common beamline axis</text>

  <line x1="985" y1="555" x2="985" y2="755" stroke="#9ca3af" stroke-width="4"/>
  <text x="896" y="540" class="text">source exit plane</text>
  <text x="910" y="562" class="small">centers lie in this plane</text>

  <circle cx="985" cy="585" r="7" class="pointGreen"/>
  <circle cx="985" cy="725" r="7" class="pointGreen"/>
  <text x="1002" y="590" class="text">source 1</text>
  <text x="1002" y="730" class="text">source 2</text>

  <circle cx="1270" cy="655" r="7" class="pointBlue"/>
  <text x="1287" y="648" class="label">intersection of source centerline</text>
  <text x="1287" y="670" class="label">with beamline axis</text>

  <line x1="985" y1="585" x2="1270" y2="655" class="optical"/>
  <line x1="985" y1="725" x2="1270" y2="655" class="optical"/>
  <text x="1092" y="594" class="label">bleni</text>
  <text x="1092" y="714" class="label">bleni</text>
  <text x="968" y="776" class="small">source centerlines / optical axes</text>

  <line x1="1270" y1="655" x2="1425" y2="655" class="beam"/>
  <circle cx="1425" cy="655" r="8" class="pointBlue"/>
  <text x="1394" y="624" class="label">pivot</text>
  <path d="M 1270 700 L 1425 700" class="measure"/>
  <text x="1330" y="689" class="label">blenp</text>

  <rect x="905" y="800" width="570" height="64" rx="12" class="noteBox"/>
  <text x="925" y="826" class="text">If nsourc = 1: source centerline = beamline axis, sfrac1 is irrelevant,</text>
  <text x="925" y="848" class="text">and bleni is often effectively unused or set very large in input files.</text>
</svg>
